name: codealpha_flashcard_app
description: Flashcard Quiz App for CodeAlpha Internship
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.2
  provider: ^6.0.5
  intl: ^0.18.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#4A6CF7"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true